name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK with Buildozer
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            python3-pip python3-setuptools \
            libltdl-dev

      - name: Install Buildozer and dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Set up Android SDK/NDK cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform
          key: buildozer-android-${{ hashFiles('android-app/buildozer.spec') }}
          restore-keys: |
            buildozer-android-

      - name: Build debug APK
        working-directory: android-app
        run: |
          buildozer android clean
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-shorts-debug-apk
          path: android-app/bin/*.apk
          retention-days: 30

      - name: Show APK info
        working-directory: android-app
        run: |
          echo "Build complete!"
          ls -lh bin/*.apk 2>/dev/null || echo "No APK found in bin/"
